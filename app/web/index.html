<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Enterprise Carpooling Platform — Ride Together, Save Together">
  <meta name="theme-color" content="#1976D2">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Carpooling">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>Carpooling — Ride Together, Save Together</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JS SDK — key is loaded from the git-ignored `web/env.js`
    (copy `web/env.example.js` to `web/env.js` and fill in your key).
    'libraries=places' enables the Places Autocomplete service.
    'loading=async' avoids blocking the initial page load.
  -->
  <script src="env.js"></script>
  <script>
    (function () {
      var key = (window.APP_ENV && window.APP_ENV.GOOGLE_MAPS_API_KEY) || '';
      if (!key) {
        console.warn('[web] GOOGLE_MAPS_API_KEY missing — copy web/env.example.js to web/env.js.');
        return;
      }
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' +
        encodeURIComponent(key) + '&libraries=places&loading=async';
      s.defer = true;
      document.head.appendChild(s);
    })();
  </script>

  <style>
    /* Branded splash shown while Flutter initialises */
    #flutter-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
      background: #1976D2;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #flutter-loading.hidden { opacity: 0; pointer-events: none; }
    #flutter-loading svg { margin-bottom: 24px; }
    #flutter-loading p {
      font-size: 14px;
      opacity: 0.85;
      letter-spacing: 0.5px;
      margin: 0;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: #1976D2; }
  </style>
</head>
<body>
  <!-- Branded loading splash -->
  <div id="flutter-loading">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="36" cy="36" r="36" fill="rgba(255,255,255,0.15)"/>
      <path d="M20 38l8 8 24-24" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="36" cy="36" r="28" stroke="white" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
    </svg>
    <p>Carpooling</p>
    <p style="font-size:11px;opacity:0.6;margin-top:6px">Ride Together, Save Together</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide the branded splash once Flutter signals it is ready.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('flutter-loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function () { el.remove(); }, 450);
      }
    });
  </script>
</body>
</html>
