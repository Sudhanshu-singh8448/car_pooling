name: car_pooling
description: "Enterprise Carpooling Platform - Ride Together, Save Together"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  lottie: ^3.3.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Backend (Supabase)
  supabase_flutter: ^2.9.0

  # Maps & Location
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.0
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.1.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  connectivity_plus: ^6.1.4
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
